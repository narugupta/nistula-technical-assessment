# version: "3.9"

services:
  app:
    build: .
    container_name: nistula_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://nistula:nistula_password@db:5432/nistula_db

  db:
    image: postgres:16
    container_name: nistula_db
    restart: always
    environment:
      POSTGRES_USER: nistula
      POSTGRES_PASSWORD: nistula_password
      POSTGRES_DB: nistula_db
    ports:
      - "5432:5432"